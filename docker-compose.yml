services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: logweave
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clusterer:
    build:
      context: services/clusterer
    ports:
      - "8000:8000"
    environment:
      LOGWEAVE_CLICKHOUSE_URL: clickhouse://clickhouse:9000/logweave
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: services/api
    ports:
      - "3000:3000"
    environment:
      LOGWEAVE_CLICKHOUSE_URL: http://clickhouse:8123
      LOGWEAVE_CLUSTERER_URL: http://clusterer:8000
      LOGWEAVE_LOG_LEVEL: info
      LOGWEAVE_API_KEYS: '{"e2e-key-tenant-a":"e2e-tenant-a","e2e-key-tenant-b":"e2e-tenant-b"}'
      # Higher than default 500ms to account for Docker networking + container startup overhead
      LOGWEAVE_CLUSTERER_TIMEOUT_MS: 5000
      LOGWEAVE_RECOVERY_INTERVAL_MS: 10000
    depends_on:
      clickhouse:
        condition: service_healthy
      clusterer:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Log simulator — generates realistic events for development + demo
  # Usage: docker compose --profile simulator up
  simulator:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
      - simulator_modules:/app/simulator/node_modules
    command: ["npx", "tsx", "simulator/src/index.ts"]
    profiles:
      - simulator
    environment:
      LOGWEAVE_SIM_API_KEY: "e2e-key-tenant-a"
      LOGWEAVE_SIM_ENDPOINT: "http://api:3000/v1/ingest/batch"
      LOGWEAVE_SIM_MODE: "chaos"
    depends_on:
      api:
        condition: service_healthy

volumes:
  clickhouse_data:
  simulator_modules:
