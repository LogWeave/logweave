services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    environment:
      CLICKHOUSE_DB: logweave
      CLICKHOUSE_USER: logweave
      CLICKHOUSE_PASSWORD: logweave-dev
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clusterer:
    build:
      context: services/clusterer
    ports:
      - "8000:8000"
    environment:
      LOGWEAVE_CLICKHOUSE_URL: http://logweave:logweave-dev@clickhouse:8123/logweave
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build:
      context: services/api
    ports:
      - "3000:3000"
    environment:
      LOGWEAVE_CLICKHOUSE_URL: http://logweave:logweave-dev@clickhouse:8123
      LOGWEAVE_CLUSTERER_URL: http://clusterer:8000
      LOGWEAVE_LOG_LEVEL: info
      LOGWEAVE_API_KEYS: '{"e2e-key-tenant-a":"e2e-tenant-a","e2e-key-tenant-b":"e2e-tenant-b"}'
      # Higher than default 500ms to account for Docker networking + container startup overhead
      LOGWEAVE_CLUSTERER_TIMEOUT_MS: 5000
      LOGWEAVE_RECOVERY_INTERVAL_MS: 10000
      # Set to 'false' on all but one instance when running multiple API containers
      # LOGWEAVE_RECOVERY_ENABLED: 'true'
    depends_on:
      clickhouse:
        condition: service_healthy
      clusterer:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  # MinIO — S3-compatible local object store for raw log storage + drill-down
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API (9000 taken by ClickHouse native)
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/logweave-logs;
      echo 'Bucket logweave-logs ready';
      "

  # Log simulator — generates realistic events for development + demo
  # Usage: docker compose --profile simulator up
  # Primary mode: pnpm simulate (runs on host, targets localhost:3000)
  simulator:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
    entrypoint: ["sh", "-c", "npm install -g tsx && tsx simulator/src/index.ts"]
    profiles:
      - simulator
    environment:
      LOGWEAVE_SIM_API_KEY: "e2e-key-tenant-a"
      LOGWEAVE_SIM_ENDPOINT: "http://api:3000/v1/ingest/batch"
      LOGWEAVE_SIM_MODE: "chaos"
    depends_on:
      api:
        condition: service_healthy

volumes:
  clickhouse_data:
  minio_data:
