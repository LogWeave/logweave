name: Release

# Fires on a semver tag (vX.Y.Z) and publishes the release artifacts:
#   - npm: @logweave/transport, @logweave/mcp
#   - GHCR: logweave-api, logweave-clusterer (git sha baked into the API image)
# See RELEASING.md for the full checklist.
#
# Required repo secret: NPM_TOKEN (an npm automation token with publish rights
# to the @logweave org). GHCR uses the built-in GITHUB_TOKEN.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (public repo only — see note)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build packages
        run: |
          pnpm -C packages/transport build
          pnpm -C services/mcp build
      # --provenance requires the source repo to be PUBLIC. If you publish from a
      # private repo, drop the flag (you lose the provenance attestation only).
      - name: Publish @logweave/transport
        run: pnpm -C packages/transport publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @logweave/mcp
        run: pnpm -C services/mcp publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Publish Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          build-args: |
            LOGWEAVE_GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/logweave/logweave-api:${{ steps.ver.outputs.version }}
            ghcr.io/logweave/logweave-api:latest
      - name: Build + push clusterer image
        uses: docker/build-push-action@v6
        with:
          context: services/clusterer
          push: true
          tags: |
            ghcr.io/logweave/logweave-clusterer:${{ steps.ver.outputs.version }}
            ghcr.io/logweave/logweave-clusterer:latest
