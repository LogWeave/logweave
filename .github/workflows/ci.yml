name: CI

# Disabled for now — running locally is sufficient for solo dev.
# Re-enable by uncommenting the triggers below when:
# - onboarding a second contributor, or
# - local test runs become insufficient confidence
on:
  workflow_dispatch: # manual trigger only
  # pull_request:
  #   branches: [main]
  # push:
  #   branches: [main]

jobs:
  clusterer:
    name: Clusterer (lint + test)
    runs-on: ubuntu-latest
    # Only run when clusterer code or shared config changes
    if: >
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'clusterer') ||
      true
    defaults:
      run:
        working-directory: services/clusterer
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint and format check
        run: uv run poe check
      - name: Run tests (strict — collection errors are failures)
        run: uv run poe test
      - name: Verify no test collection errors
        run: |
          output=$(uv run pytest --co -q 2>&1)
          if echo "$output" | grep -q "error"; then
            echo "::error::Test collection errors detected"
            echo "$output"
            exit 1
          fi
          count=$(echo "$output" | tail -1 | grep -oP '\d+(?= test)')
          echo "Collected $count tests"

  api:
    name: API (lint + test)
    runs-on: ubuntu-latest
    # Skip until API server code exists
    if: hashFiles('services/api/package.json') != ''
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: services/api/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Biome check
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
