services:
  # Wire api to wait for local S3 bucket before starting
  api:
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # MinIO — local S3-compatible store for S3 connector dev/testing
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API (9000 taken by ClickHouse native)
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create default bucket on startup
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/logweave-logs;
      echo 'Bucket logweave-logs ready';
      "

  # Log simulator — generates realistic multi-service events
  # Primary mode: pnpm simulate (runs on host, targets localhost:3000)
  simulator:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - .:/app
    entrypoint: ["sh", "-c", "npm install -g tsx && tsx simulator/src/index.ts"]
    environment:
      LOGWEAVE_SIM_API_KEY: "dev-key"
      LOGWEAVE_SIM_ENDPOINT: "http://api:3000/v1/ingest/batch"
      LOGWEAVE_SIM_MODE: "chaos"
    depends_on:
      api:
        condition: service_healthy

volumes:
  minio_data:
