# LogWeave — Production Docker Compose
#
# Usage:
#   cp .env.production.example .env    # edit values
#   docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites: Docker Engine 24+, Docker Compose v2
#
# Security note: all three containers (api, clusterer, clickhouse) share the default
# bridge network and can reach each other freely. ClickHouse ports are not exposed
# to the host. For stricter isolation, define explicit networks: blocks and restrict
# cross-container access so only api can reach clickhouse/clusterer.

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
      - ./docker/clickhouse/backups.xml:/etc/clickhouse-server/config.d/backups.xml:ro
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-logweave}
      CLICKHOUSE_PASSWORD_SHA256: ${CLICKHOUSE_PASSWORD_SHA256:-}
    # ClickHouse ports are NOT exposed to host — only accessible by other containers
    expose:
      - "8123"
      - "9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  clusterer:
    build:
      context: services/clusterer
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - drain3_checkpoints:/data/drain3
    environment:
      LOGWEAVE_CLICKHOUSE_URL: http://clickhouse:8123/logweave
      LOGWEAVE_CLICKHOUSE_USER: ${LOGWEAVE_CLICKHOUSE_USER:-}
      LOGWEAVE_CLICKHOUSE_PASSWORD: ${LOGWEAVE_CLICKHOUSE_PASSWORD:-}
      LOGWEAVE_DRAIN3_CHECKPOINT_DIR: /data/drain3
      LOGWEAVE_DRAIN3_SIM_TH: ${LOGWEAVE_DRAIN3_SIM_TH:-0.4}
      LOGWEAVE_DRAIN3_DEPTH: ${LOGWEAVE_DRAIN3_DEPTH:-4}
      LOGWEAVE_DRAIN3_MAX_CLUSTERS: ${LOGWEAVE_DRAIN3_MAX_CLUSTERS:-10000}
      LOGWEAVE_MAX_CONCURRENT_REQUESTS: ${LOGWEAVE_MAX_CONCURRENT_REQUESTS:-4}
      LOGWEAVE_MAX_TENANTS: ${LOGWEAVE_MAX_TENANTS:-200}
      # Required to restore Drain3 checkpoints across restarts. If unset, the
      # clusterer refuses to load on-disk checkpoints (jsonpickle integrity
      # cannot be verified) and starts fresh. Generate with: openssl rand -hex 32
      LOGWEAVE_CHECKPOINT_HMAC_KEY: ${LOGWEAVE_CHECKPOINT_HMAC_KEY:-}
      # Shared secret guarding the destructive endpoints (/cluster/reset,
      # /embed/backfill). Must match the api service value below.
      LOGWEAVE_INTERNAL_SECRET: ${LOGWEAVE_INTERNAL_SECRET:-}
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      # python:slim ships no wget/curl — use stdlib urllib for the probe.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  api:
    build:
      # Root context so the image can also build the dashboard workspace package.
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    # Not published to the host — Caddy (below) terminates TLS and reverse-proxies
    # to this over the internal network. Publishing :3000 directly would let a
    # plain-HTTP login silently loop (the session cookie is Secure under
    # NODE_ENV=production, so browsers won't return it over http).
    expose:
      - "3000"
    volumes:
      - api_data:/data
    environment:
      NODE_ENV: production
      LOGWEAVE_DATA_DIR: /data
      LOGWEAVE_CLICKHOUSE_URL: http://clickhouse:8123
      LOGWEAVE_CLICKHOUSE_USER: ${LOGWEAVE_CLICKHOUSE_USER:-}
      LOGWEAVE_CLICKHOUSE_PASSWORD: ${LOGWEAVE_CLICKHOUSE_PASSWORD:-}
      LOGWEAVE_CLUSTERER_URL: http://clusterer:8000
      # Archive drill-down (#275): the customer's own bucket; auth via the EC2
      # instance role (default credential chain, no static creds here).
      LOGWEAVE_ARCHIVE_BUCKET: ${LOGWEAVE_ARCHIVE_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Durable-archive ingest (epic #265): when set (requires the archive
      # bucket above), ingest forwards batches to Vector for S3 archival and the
      # async consumer clusters off the hot path, instead of clustering inline.
      # Opt-in — default empty keeps the synchronous path. Setting this AUTO-ENABLES
      # the reconciliation sweep (#287): there is no real-time notify producer, so
      # the sweep is the only writer that backfills forwarded objects into
      # log_metadata — without it forwarded logs land in S3 but stay unqueryable.
      LOGWEAVE_VECTOR_ARCHIVE_URL: ${LOGWEAVE_VECTOR_ARCHIVE_URL:-}
      # Archive reconciliation sweep (#279). Auto-forced on when the Vector URL
      # above is set; set it here only to run the sweep as a standalone backstop
      # without forwarding (e.g. drill-down bucket configured, sync ingest path).
      LOGWEAVE_ARCHIVE_RECONCILE_ENABLED: ${LOGWEAVE_ARCHIVE_RECONCILE_ENABLED:-}
      # Forwarded to the clusterer's destructive endpoints; must match the
      # clusterer service value above.
      LOGWEAVE_INTERNAL_SECRET: ${LOGWEAVE_INTERNAL_SECRET:-}
      LOGWEAVE_API_KEYS: ${LOGWEAVE_API_KEYS}
      LOGWEAVE_ENCRYPTION_KEY: ${LOGWEAVE_ENCRYPTION_KEY:-}
      # Runs behind Caddy in this compose file, so trust one proxy hop by default.
      LOGWEAVE_TRUST_PROXY: ${LOGWEAVE_TRUST_PROXY:-true}
      LOGWEAVE_LOG_LEVEL: ${LOGWEAVE_LOG_LEVEL:-info}
      LOGWEAVE_CLUSTERER_TIMEOUT_MS: ${LOGWEAVE_CLUSTERER_TIMEOUT_MS:-2000}
      LOGWEAVE_RATE_LIMIT_RPM: ${LOGWEAVE_RATE_LIMIT_RPM:-300}
      LOGWEAVE_RATE_LIMIT_TENANT_RPM: ${LOGWEAVE_RATE_LIMIT_TENANT_RPM:-600}
      LOGWEAVE_RATE_LIMIT_INGEST_RPM: ${LOGWEAVE_RATE_LIMIT_INGEST_RPM:-600}
      LOGWEAVE_MAX_CONCURRENT_QUERIES: ${LOGWEAVE_MAX_CONCURRENT_QUERIES:-8}
      LOGWEAVE_RECOVERY_ENABLED: ${LOGWEAVE_RECOVERY_ENABLED:-true}
      LOGWEAVE_RECOVERY_INTERVAL_MS: ${LOGWEAVE_RECOVERY_INTERVAL_MS:-60000}
      LOGWEAVE_RECOVERY_LOOKBACK_HOURS: ${LOGWEAVE_RECOVERY_LOOKBACK_HOURS:-24}
      LOGWEAVE_RETENTION_ENABLED: ${LOGWEAVE_RETENTION_ENABLED:-true}
      LOGWEAVE_SHUTDOWN_TIMEOUT_MS: ${LOGWEAVE_SHUTDOWN_TIMEOUT_MS:-10000}
    depends_on:
      clickhouse:
        condition: service_healthy
      clusterer:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Caddy — terminates TLS and reverse-proxies to the API. Set LOGWEAVE_DOMAIN to
  # a public hostname for automatic Let's Encrypt certs (http→https redirect);
  # unset, it defaults to localhost with a self-signed cert. This is the public
  # entrypoint — the API is not published to the host directly (see its `expose`
  # above), which is what stops the plain-HTTP login loop.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      LOGWEAVE_DOMAIN: ${LOGWEAVE_DOMAIN:-localhost}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # Vector — archive engine (epic #265, seam B). Writes gzip NDJSON batches to
  # the customer's own S3 bucket as the system of record; the landed key becomes
  # the `source_ref`. On EC2 it authenticates via the instance role (no creds in
  # this file); LOGWEAVE_ARCHIVE_BUCKET is supplied from the network stack.
  vector:
    # Pinned by digest (= timberio/vector:0.40.0-debian) so an upstream retag
    # can't silently change the system-of-record engine. Bump deliberately.
    image: timberio/vector@sha256:1163571c8b59ab6755c1b5488bb2f129151c3b72130ad0500b10420fcc504d9d
    restart: unless-stopped
    command: ["--config", "/etc/vector/vector.toml"]
    expose:
      - "8686"
    volumes:
      - ./deploy/vector/vector.toml:/etc/vector/vector.toml:ro
    environment:
      LOGWEAVE_ARCHIVE_BUCKET: ${LOGWEAVE_ARCHIVE_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  clickhouse_data:
  drain3_checkpoints:
  api_data:
  caddy_data:
  caddy_config:
